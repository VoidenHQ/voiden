# Builds and publishes @voiden/runner to npm, and attaches a .tgz to a GitHub Release.
#
# Trigger: manual (workflow_dispatch)
# Bump the version in packages/voiden-runner/package.json, commit, then trigger this workflow.
#
# Required repository secret:
#   NPM_TOKEN  — Automation token from npmjs.com (Settings → Access Tokens → Automation)

name: Release voiden-runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read runner version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/voiden-runner/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=runner-v$VERSION" >> "$GITHUB_OUTPUT"

      # core-extensions is gitignored — fetch it from its own repo
      - name: Clone core-extensions
        run: git clone https://github.com/VoidenHQ/core-extensions.git core-extensions

      - name: Setup Node (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install workspace dependencies
        run: yarn install --immutable

      # npm run build handles the full chain:
      #   prebuild → tsc in core-extensions → tsc in executors
      #   build    → tsc in voiden-runner
      - name: Build @voiden/runner
        working-directory: packages/voiden-runner
        run: npm run build

      # ── Publish to npm ────────────────────────────────────────────────────────
      - name: Publish to npm
        working-directory: packages/voiden-runner
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Attach tarball to GitHub Release ─────────────────────────────────────
      - name: Pack tarball
        working-directory: packages/voiden-runner
        run: npm pack

      - name: Get tarball name
        id: tarball
        working-directory: packages/voiden-runner
        run: echo "name=$(ls *.tgz)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: voiden-runner ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ### Install

            ```bash
            npm install -g @voiden/runner
            ```

            Or from this release tarball:
            ```bash
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.tarball.outputs.name }}
            ```
          files: packages/voiden-runner/${{ steps.tarball.outputs.name }}
