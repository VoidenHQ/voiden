# Builds Voiden desktop installer binaries for all platforms — no S3 publish,
# no version bump, no versioned GitHub Release. Installer binaries
# (.dmg/.deb/.rpm/.AppImage/.exe) are attached to a draft GitHub Release for
# direct download links (draft releases are only visible to repo collaborators).
#
# Use this for ad-hoc / dev builds you want to hand out for testing without
# going through "Release Voiden App" (release-app.yml), which publishes to S3
# and cuts a real versioned release.
#
# Trigger: manual (workflow_dispatch) — each platform is an independent
# checkbox, so you can build just one OS (e.g. Windows-only while iterating
# on signing) instead of all four every time.
#
# Required repository secrets:
#   APPLE_CERTIFICATE           — base64-encoded .p12 developer certificate
#   APPLE_CERTIFICATE_PASSWORD  — password for the .p12
#   KEYCHAIN_PASSWORD           — password for the temporary build keychain
#   APPLE_ID                    — Apple ID for notarization
#   APPLE_ID_PASSWORD           — App-specific password for notarization
#   APPLE_TEAM_ID               — Apple Developer Team ID
#   AZURE_CLIENT_ID                  — Azure service principal client ID
#   AZURE_CLIENT_SECRET              — Azure service principal client secret
#   AZURE_TENANT_ID                  — Azure AD tenant ID
#   AZURE_CODE_SIGNING_ENDPOINT      — e.g. https://<region>.codesigning.azure.net
#   AZURE_CODE_SIGNING_ACCOUNT_NAME  — Trusted Signing account name in Azure Portal
#   AZURE_CODE_SIGNING_CERT_PROFILE  — certificate profile name in Azure Trusted Signing

name: Build Voiden Assets

on:
  workflow_dispatch:
    inputs:
      macos:
        description: 'macOS (Silicon arm64 + Intel x64)'
        required: true
        type: boolean
        default: true
      windows:
        description: 'Windows (x64)'
        required: true
        type: boolean
        default: true
      linux:
        description: 'Linux (x64)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  NODE_OPTIONS: --max-old-space-size=4096
  RELEASE_CHANNEL: asset

jobs:
  # ── Select platforms ──────────────────────────────────────────────────────────
  # workflow_dispatch has no native multi-select input, so platform choice is
  # modeled as three independent boolean checkboxes, filtered here into the
  # actual matrix the build job consumes.
  setup-matrix:
    name: Select platforms
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - name: Filter platform matrix
        id: filter
        env:
          BUILD_MACOS: ${{ inputs.macos }}
          BUILD_WINDOWS: ${{ inputs.windows }}
          BUILD_LINUX: ${{ inputs.linux }}
        run: |
          INCLUDE=$(node -e "
            const entries = {
              // Intel build is cross-packaged on the arm64 runner via --arch=x64 —
              // GitHub's free plan no longer has a standalone Intel macOS runner
              // pool (macos-13 is retired; Intel 'large' runners require a paid
              // Team/Enterprise plan). Packaging, codesigning, and notarization
              // don't need native x64 hardware to run.
              macos: [
                { label: 'macOS Silicon (arm64)', os: 'macos-latest', arch_flag: '', artifact_name: 'darwin-arm64' },
                { label: 'macOS Intel (x64)', os: 'macos-latest', arch_flag: '--arch=x64', artifact_name: 'darwin-x64' },
              ],
              // Pinned to windows-2022 (not windows-latest) — that image bundles
              // Visual Studio '18' (2026), and the installed node-gyp doesn't
              // recognize that version string ('unknown version \\\"undefined\\\"'),
              // so it fails to find VS at all even though it's present.
              windows: [
                { label: 'Windows (x64)', os: 'windows-2022', arch_flag: '', artifact_name: 'win32-x64' },
              ],
              linux: [
                { label: 'Linux (x64)', os: 'ubuntu-latest', arch_flag: '', artifact_name: 'linux-x64' },
              ],
            };
            const enabled = {
              macos: process.env.BUILD_MACOS === 'true',
              windows: process.env.BUILD_WINDOWS === 'true',
              linux: process.env.BUILD_LINUX === 'true',
            };
            const include = Object.entries(entries)
              .filter(([platform]) => enabled[platform])
              .flatMap(([, list]) => list);
            console.log(JSON.stringify(include));
          ")
          echo "Selected platforms: $INCLUDE"
          echo "matrix={\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"

  # ── Per-platform build ────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.label }}
    needs: setup-matrix
    if: needs.setup-matrix.outputs.matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Clones plugin-registry + core plugins, removes node_modules, yarn install, builds plugins
      - name: Run cleanup (macOS / Linux)
        if: runner.os != 'Windows'
        run: chmod +x cleanup.sh && ./cleanup.sh

      - name: Run cleanup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cleanup.bat

      # cleanup.bat installs with --mode=skip-build — node-pty's unpatched source
      # fails to compile under MSVC 2022 + C++20. Patch it, then force a rebuild.
      - name: Apply Windows native build patches
        if: runner.os == 'Windows'
        shell: bash
        run: bash patches/win-native-fixes/apply-patches.sh

      - name: Rebuild native modules (Windows)
        if: runner.os == 'Windows'
        run: yarn rebuild

      # macOS: import developer certificate into a temporary keychain so
      # electron-forge osxSign can codesign the app bundle.
      - name: Import Apple certificate into keychain
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      # Microsoft.ArtifactSigning.Client (the Trusted Signing service was renamed
      # "Artifact Signing") ships as a plain NuGet library package, not a dotnet
      # global tool — `dotnet tool install` fails with "not found in NuGet feeds".
      # Download it + the matching SignTool build via nuget.exe instead, then
      # locate the extracted signtool.exe / dlib and expose their paths to
      # forge.config.ts via GITHUB_ENV.
      - name: Setup .NET 8 runtime (required by Artifact Signing dlib)
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Artifact Signing client tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          ./nuget.exe install Microsoft.Windows.SDK.BuildTools -OutputDirectory signing-tools -ExcludeVersion -NonInteractive
          ./nuget.exe install Microsoft.ArtifactSigning.Client -OutputDirectory signing-tools -ExcludeVersion -NonInteractive

          $signtool = Get-ChildItem -Path "signing-tools\Microsoft.Windows.SDK.BuildTools" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1
          $dlib = Get-ChildItem -Path "signing-tools\Microsoft.ArtifactSigning.Client" -Recurse -Filter Azure.CodeSigning.Dlib.dll |
            Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1

          if (-not $signtool) { throw "signtool.exe not found in Microsoft.Windows.SDK.BuildTools package" }
          if (-not $dlib) { throw "Azure.CodeSigning.Dlib.dll not found in Microsoft.ArtifactSigning.Client package" }

          echo "SIGNTOOL_PATH=$($signtool.FullName)" >> $env:GITHUB_ENV
          echo "SIGNING_DLIB_PATH=$($dlib.FullName)" >> $env:GITHUB_ENV

      - name: Make — macOS Silicon
        if: matrix.artifact_name == 'darwin-arm64'
        working-directory: apps/electron
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn make

      - name: Make — macOS Intel
        if: matrix.artifact_name == 'darwin-x64'
        working-directory: apps/electron
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn make --arch=x64

      - name: Make — Windows
        if: matrix.artifact_name == 'win32-x64'
        working-directory: apps/electron
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          AZURE_CODE_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_CODE_SIGNING_CERT_PROFILE }}
        run: yarn make

      - name: Make — Linux
        if: matrix.artifact_name == 'linux-x64'
        working-directory: apps/electron
        run: yarn make

      # Upload everything from out/make/ so the GitHub Release job can use it
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voiden-${{ matrix.artifact_name }}
          path: apps/electron/out/make/
          if-no-files-found: warn

      # Tear down the temporary keychain to avoid leaving certs on the runner
      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  # ── draft GitHub Release with installer binaries ──────────────────────────────
  release:
    name: Create draft GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: voiden-*

      - name: List artifacts
        run: find release-artifacts -type f | sort

      # Installer binaries only (skip .zip — it's the raw app bundle, not a
      # user-facing distributable), tagged per run so repeat asset builds
      # don't collide with each other or with real version tags.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: asset-${{ steps.version.outputs.version }}-${{ github.run_id }}
          name: Voiden v${{ steps.version.outputs.version }} (asset build #${{ github.run_number }})
          draft: true
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
