# Builds and publishes the Voiden desktop app for all platforms.
#
# Trigger: manual (workflow_dispatch) — admin only
#
# Channels:
#   beta        — publishes to S3 (beta bucket) + creates a pre-release GitHub Release
#   stable      — publishes to S3 (stable bucket) + creates a GitHub Release
#   development — publishes to S3 (dev bucket) only; no GitHub Release is created
#
# For a build-only run (no S3 publish, no version release — just installer
# binaries attached to a draft GitHub Release), use the separate
# "Build Voiden Assets" workflow (build-app-assets.yml) instead.
#
# Required repository secrets:
#   APPLE_CERTIFICATE           — base64-encoded .p12 developer certificate
#   APPLE_CERTIFICATE_PASSWORD  — password for the .p12
#   KEYCHAIN_PASSWORD           — password for the temporary build keychain
#   APPLE_ID                    — Apple ID for notarization
#   APPLE_ID_PASSWORD           — App-specific password for notarization
#   APPLE_TEAM_ID               — Apple Developer Team ID
#   AZURE_CLIENT_ID                  — Azure service principal client ID
#   AZURE_CLIENT_SECRET              — Azure service principal client secret
#   AZURE_TENANT_ID                  — Azure AD tenant ID
#   AZURE_CODE_SIGNING_ENDPOINT      — e.g. https://<account>.<region>.codesigning.azure.net
#   AZURE_CODE_SIGNING_CERT_PROFILE  — certificate profile name in Azure Trusted Signing
#   Each channel publishes through its own IAM credentials, scoped to its own bucket:
#   S3_ACCESS_KEY_ID_BETA       — AWS access key for beta channel
#   S3_SECRET_ACCESS_KEY_BETA   — AWS secret key for beta channel
#   S3_BUCKET_NAME_BETA         — S3 bucket for beta channel  (default: voiden-beta-releases)
#   S3_ACCESS_KEY_ID_STABLE     — AWS access key for stable channel
#   S3_SECRET_ACCESS_KEY_STABLE — AWS secret key for stable channel
#   S3_BUCKET_NAME_STABLE       — S3 bucket for stable channel (default: voiden-releases)
#   S3_ACCESS_KEY_ID_DEV        — AWS access key for development channel
#   S3_SECRET_ACCESS_KEY_DEV    — AWS secret key for development channel
#   S3_BUCKET_NAME_DEV          — S3 bucket for development channel (default: voiden-dev-releases)
#
#   APT repo + Snap Store publishing (beta + stable only) is handled by the
#   "Release Package Managers" workflow (release-package-managers.yml), called
#   below after the Linux build. See that file for its required secrets.

name: Release Voiden App

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - beta
          - stable
          - development

permissions:
  contents: write
  actions: read

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ── Per-platform build ────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Silicon (arm64)
            os: macos-latest
            arch_flag: ''
            artifact_name: darwin-arm64

          # Cross-packaged on the arm64 runner via --arch=x64 — GitHub's free plan
          # no longer has a standalone Intel macOS runner pool (macos-13 is retired;
          # Intel "large" runners require a paid Team/Enterprise plan). Packaging,
          # codesigning, and notarization don't need native x64 hardware to run.
          - label: macOS Intel (x64)
            os: macos-latest
            arch_flag: '--arch=x64'
            artifact_name: darwin-x64

          - label: Windows (x64)
            os: windows-latest
            arch_flag: ''
            artifact_name: win32-x64

          - label: Linux (x64)
            os: ubuntu-latest
            arch_flag: ''
            artifact_name: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Clones plugin-registry + core plugins, removes node_modules, yarn install, builds plugins
      - name: Run cleanup (macOS / Linux)
        if: runner.os != 'Windows'
        run: chmod +x cleanup.sh && ./cleanup.sh

      - name: Run cleanup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cleanup.bat

      # cleanup.bat installs with --mode=skip-build — node-pty's unpatched source
      # fails to compile under MSVC 2022 + C++20. Patch it, then force a rebuild.
      - name: Apply Windows native build patches
        if: runner.os == 'Windows'
        shell: bash
        run: bash patches/win-native-fixes/apply-patches.sh

      - name: Rebuild native modules (Windows)
        if: runner.os == 'Windows'
        run: yarn rebuild

      # macOS: import developer certificate into a temporary keychain so
      # electron-forge osxSign can codesign the app bundle.
      - name: Import Apple certificate into keychain
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Install AzureSignTool
        if: runner.os == 'Windows'
        run: dotnet tool install --global AzureSignTool

      # ── beta / stable / development: yarn publish (make + upload to S3) ──────
      - name: Publish to S3 — macOS Silicon
        if: matrix.artifact_name == 'darwin-arm64'
        working-directory: apps/electron
        env:
          RELEASE_CHANNEL: ${{ inputs.channel }}
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_ACCESS_KEY_ID_DEV: ${{ secrets.S3_ACCESS_KEY_ID_DEV }}
          S3_SECRET_ACCESS_KEY_DEV: ${{ secrets.S3_SECRET_ACCESS_KEY_DEV }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
          S3_BUCKET_NAME_DEV: ${{ secrets.S3_BUCKET_NAME_DEV }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn publish

      - name: Publish to S3 — macOS Intel
        if: matrix.artifact_name == 'darwin-x64'
        working-directory: apps/electron
        env:
          RELEASE_CHANNEL: ${{ inputs.channel }}
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_ACCESS_KEY_ID_DEV: ${{ secrets.S3_ACCESS_KEY_ID_DEV }}
          S3_SECRET_ACCESS_KEY_DEV: ${{ secrets.S3_SECRET_ACCESS_KEY_DEV }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
          S3_BUCKET_NAME_DEV: ${{ secrets.S3_BUCKET_NAME_DEV }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn publish --arch=x64

      - name: Publish to S3 — Windows
        if: matrix.artifact_name == 'win32-x64'
        working-directory: apps/electron
        env:
          RELEASE_CHANNEL: ${{ inputs.channel }}
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_ACCESS_KEY_ID_DEV: ${{ secrets.S3_ACCESS_KEY_ID_DEV }}
          S3_SECRET_ACCESS_KEY_DEV: ${{ secrets.S3_SECRET_ACCESS_KEY_DEV }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
          S3_BUCKET_NAME_DEV: ${{ secrets.S3_BUCKET_NAME_DEV }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_CODE_SIGNING_CERT_PROFILE }}
        run: yarn publish

      - name: Publish to S3 — Linux
        if: matrix.artifact_name == 'linux-x64'
        working-directory: apps/electron
        env:
          RELEASE_CHANNEL: ${{ inputs.channel }}
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_ACCESS_KEY_ID_DEV: ${{ secrets.S3_ACCESS_KEY_ID_DEV }}
          S3_SECRET_ACCESS_KEY_DEV: ${{ secrets.S3_SECRET_ACCESS_KEY_DEV }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
          S3_BUCKET_NAME_DEV: ${{ secrets.S3_BUCKET_NAME_DEV }}
        run: yarn publish

      # Republish Linux artifacts: generates latest.json and uploads .deb/.rpm/.AppImage URLs to S3
      - name: Republish Linux artifacts
        if: (inputs.channel == 'beta' || inputs.channel == 'stable') && matrix.artifact_name == 'linux-x64'
        working-directory: apps/electron
        env:
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
        run: node republish.js ${{ inputs.channel }}

      # Upload everything from out/make/ so both S3 + GitHub Release jobs can use it
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voiden-${{ matrix.artifact_name }}
          path: apps/electron/out/make/
          if-no-files-found: warn

      # Tear down the temporary keychain to avoid leaving certs on the runner
      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  # ── apt + snap publishing (beta + stable only) ────────────────────────────────
  package-managers:
    name: Release Package Managers
    needs: build
    if: inputs.channel == 'beta' || inputs.channel == 'stable'
    uses: ./.github/workflows/release-package-managers.yml
    secrets: inherit
    with:
      channel: ${{ inputs.channel }}

  # ── GitHub Release (stable + beta) ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: inputs.channel != 'development'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: voiden-*

      - name: List artifacts
        run: find release-artifacts -type f | sort

      # Pulls the changelog entry matching this version (apps/ui/src/data/changelog.json)
      # into apps/electron/release-notes.md, used as the release body below.
      - name: Generate release notes from changelog
        id: release-notes
        run: node apps/electron/generate-release-notes.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Voiden v${{ steps.version.outputs.version }}
          prerelease: ${{ inputs.channel == 'beta' }}
          generate_release_notes: true
          body_path: apps/electron/release-notes.md
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.yml
